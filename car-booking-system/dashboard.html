<h2>จองรถ</h2>

<select id="vehicle">

<option>Toyota Commuter</option>

<option>Fortuner</option>

</select>

<input type="date" id="startDate">

<input type="date" id="endDate">

<textarea id="purpose" placeholder="วัตถุประสงค์"></textarea>

<button onclick="booking()">ส่งคำขอจอง</button>

<script>

const API = "https://script.google.com/macros/s/AKfycbwlujiE3-hiwcty0GmcNEmwTxTB-wpOruhp091a3770xdeg2fBKg_6fMFZM2fmoJQ/exec";

async function booking(){

await fetch(API,{

method:"POST",

body:JSON.stringify({

action:"booking",

user:localStorage.getItem("user"),

department:localStorage.getItem("department"),

vehicle:vehicle.value,

startDate:startDate.value,

endDate:endDate.value,

purpose:purpose.value

})

});

alert("จองสำเร็จ");

}

</script>
