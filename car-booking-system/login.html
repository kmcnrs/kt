<!DOCTYPE html>

<html lang="th">

<head>

<meta charset="UTF-8">

<title>ระบบจองรถ</title>

<style>

body{font-family:Arial;background:#f5f5f5;padding:30px;}

.box{max-width:400px;margin:auto;background:white;padding:20px;border-radius:10px;}

input,button{width:100%;padding:10px;margin:5px 0;}

button{background:#2563eb;color:white;border:none;cursor:pointer;}

</style>

</head>

<body>

<div class="box">

<h2>เข้าสู่ระบบ</h2>

<input id="username" placeholder="Username">

<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbwlujiE3-hiwcty0GmcNEmwTxTB-wpOruhp091a3770xdeg2fBKg_6fMFZM2fmoJQ/exec";

async function login(){

const res = await fetch(API,{

method:"POST",

body:JSON.stringify({

action:"login",

username:username.value,

password:password.value

})

});

const data = await res.json();

if(data.success){

localStorage.setItem("user",data.username);

localStorage.setItem("role",data.role);

localStorage.setItem("department",data.department);

if(data.role === "admin"){

location.href = "admin.html";

}else{

location.href = "dashboard.html";

}

}else{

alert("Username หรือ Password ไม่ถูกต้อง");

}

}

</script>

</body>

</html>
