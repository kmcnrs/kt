<h2>จัดการการจองรถ</h2>

<table border="1" width="100%">

<thead>

<tr>

<th>ผู้จอง</th>

<th>แผนก</th>

<th>รถ</th>

<th>วันเริ่ม</th>

<th>วันสิ้นสุด</th>

<th>สถานะ</th>

<th>จัดการ</th>

</tr>

</thead>

<tbody id="tb"></tbody>

</table>

<script>

const API = "https://script.google.com/macros/s/AKfycbwlujiE3-hiwcty0GmcNEmwTxTB-wpOruhp091a3770xdeg2fBKg_6fMFZM2fmoJQ/exec";

async function load(){

const res = await fetch(API,{

method:"POST",

body:JSON.stringify({action:"getBookings"})

});

const data = await res.json();

tb.innerHTML = "";

data.forEach(r=>{

tb.innerHTML += `

<tr>

<td>${r[1]}</td>

<td>${r[2]}</td>

<td>${r[3]}</td>

<td>${r[4]}</td>

<td>${r[5]}</td>

<td>${r[7]}</td>

<td>

<button onclick="updateStatus(${r[0]},'Approved')">อนุมัติ</button>

<button onclick="updateStatus(${r[0]},'Rejected')">ไม่อนุมัติ</button>

</td>

</tr>`;

});

}

async function updateStatus(id,status){

await fetch(API,{

method:"POST",

body:JSON.stringify({

action:"updateStatus",

id:id,

status:status

})

});

load();

}

load();

</script>
