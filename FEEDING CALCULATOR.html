<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบคำนวณแผนการให้อาหารไก่</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Sarabun', 'sans-serif'],
                        mono: ['IBM Plex Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap');

        @media print {
            .no-print {
                display: none !important;
            }

            .print-only {
                display: inline !important;
            }

            body {
                background-color: white;
                color: black;
                padding: 0;
            }

            main {
                max-width: 100% !important;
                padding: 0 !important;
            }
        }

        .print-only {
            display: none;
        }
    </style>
</head>
<body class="bg-slate-200/70 text-slate-900 min-h-screen font-sans antialiased p-2 sm:p-6">

    <main class="max-w-7xl mx-auto bg-white border border-slate-200 rounded-2xl shadow-lg overflow-hidden">

        <div class="bg-gradient-to-r from-blue-900 via-blue-800 to-indigo-900 text-white px-4 py-4 sm:px-6 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <span class="text-2xl">🐔</span>
                <div>
                    <h1 class="text-base sm:text-lg font-bold tracking-tight">ระบบคำนวณแผนการให้อาหารไก่</h1>
                    <p class="text-[9px] sm:text-[10px] text-blue-200 font-mono tracking-wider uppercase">Weekly Chicken Feeding Report Form</p>
                </div>
            </div>

            <div class="flex flex-wrap items-center gap-2 bg-black/20 p-2 rounded-xl border border-white/10 text-xs self-end sm:self-center">
                <div class="flex items-center gap-1">
                    <span class="text-blue-200 font-medium">ฟาร์ม:</span>
                    <input type="text" id="farm_name" value="NS" readonly class="w-8 text-center bg-white/10 font-bold rounded px-1 py-0.5 outline-none border border-white/5 cursor-not-allowed">
                </div>
                <div class="flex items-center gap-1">
                    <span class="text-blue-200 font-medium">ฝูง:</span>
                    <input type="text" id="flock_name" value="A" oninput="calc()" class="w-8 text-center bg-white text-slate-900 font-bold rounded px-1 py-0.5 outline-none no-print">
                    <span class="print-only font-bold text-white" id="print_flock">A</span>
                </div>
                <div class="flex items-center gap-1">
                    <span class="text-blue-200 font-medium">เล้า:</span>
                    <select id="house_select" onchange="calc()" class="bg-white text-slate-900 font-bold rounded px-1 py-0.5 outline-none cursor-pointer no-print">
                        <option value="1T1">1T1</option>
                        <option value="1T2">1T2</option>
                        <option value="1T3">1T3</option>
                        <option value="1T4">1T4</option>
                        <option value="1M1">1M1</option>
                        <option value="1M2">1M2</option>
                        <option value="1M3">1M3</option>
                        <option value="1M4">1M4</option>
                        <option value="1B1">1B1</option>
                        <option value="1B2">1B2</option>
                        <option value="1B3">1B3</option>
                        <option value="1B4">1B4</option>
                        <option value="2T1">2T1</option>
                        <option value="2T2">2T2</option>
                        <option value="2T3">2T3</option>
                        <option value="2T4">2T4</option>
                        <option value="2M1">2M1</option>
                        <option value="2M2">2M2</option>
                        <option value="2M3">2M3</option>
                        <option value="2M4">2M4</option>
                        <option value="2B1">2B1</option>
                        <option value="2B2">2B2</option>
                        <option value="2B3">2B3</option>
                        <option value="2B4">2B4</option>
                    </select>
                    <span class="print-only font-bold text-white" id="print_house">เลือกเล้า</span>
                </div>
                <div class="flex items-center gap-1">
                    <span class="text-blue-200 font-medium">ครั้งที่:</span>
                    <input type="text" id="round_no" value="" placeholder="-" oninput="calc()" class="w-16 text-center bg-white text-slate-900 font-semibold rounded px-1 py-0.5 outline-none no-print">
                    <span class="print-only font-bold text-white" id="print_round">-</span>
                </div>
                <div class="flex items-center gap-1 bg-blue-950/50 px-2 py-0.5 rounded border border-blue-500/30">
                    <span class="text-cyan-300 font-bold font-mono">Ref No:</span>
                    <span id="ref_no_display" class="font-mono font-bold text-white">-</span>
                </div>
            </div>

            <div class="text-right text-xs font-semibold text-blue-100 print-only hidden" id="print_summary_header">
                --
            </div>
        </div>

        <div class="bg-slate-50 border-b border-slate-200 p-4 sm:p-6 no-print">
            <div class="grid grid-cols-1 sm:grid-cols-4 gap-4">
                <div class="flex flex-col gap-1.5">
                    <label class="text-xs font-bold text-slate-500 uppercase">สูตรการคำนวณเริ่มต้น</label>
                    <select id="formula_select" onchange="handleFormulaChange()" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm bg-white font-semibold text-slate-800 focus:outline-none focus:border-slate-500 cursor-pointer">
                        <option value="1">สูตร 1 — ทุกวัน (7 วัน)</option>
                        <option value="2" selected>สูตร 2 — ให้ 4 วัน เว้น 3 วัน</option>
                        <option value="3">สูตร 3 — ให้ 5 วัน เว้น 2 วัน</option>
                        <option value="4">สูตร 4 — ให้ 6 วัน เว้น 1 วัน</option>
                    </select>
                </div>
                <div class="flex flex-col gap-1.5">
                    <label class="text-xs font-bold text-slate-500 uppercase">จำนวนไก่/สัปดาห์</label>
                    <div class="relative">
                        <input type="number" id="chickens" value="0" min="0" oninput="calc()" class="w-full px-3 py-2 border border-slate-300 rounded-lg font-mono font-semibold text-sm text-slate-800 focus:outline-none focus:border-slate-500">
                        <span class="absolute right-3 top-1/2 -translate-y-1/2 text-xs font-bold text-slate-400">ตัว</span>
                    </div>
                </div>
                <div class="flex flex-col gap-1.5">
                    <label class="text-xs font-bold text-slate-500 uppercase">กรัมอาหารที่ให้ต่อตัว/สัปดาห์</label>
                    <div class="relative">
                        <input type="number" id="grams" value="0" min="0" oninput="calc()" class="w-full px-3 py-2 border border-slate-300 rounded-lg font-mono font-semibold text-sm text-slate-800 focus:outline-none focus:border-slate-500">
                        <span class="absolute right-3 top-1/2 -translate-y-1/2 text-xs font-bold text-slate-400">กรัม</span>
                    </div>
                </div>
                <div class="flex flex-col gap-1.5">
                    <label class="text-xs font-bold text-slate-500 uppercase">น้ำหนักไก่/สัปดาห์</label>
                    <div class="relative">
                        <input type="number" id="chicken_weight" value="0" min="0" oninput="calc()" class="w-full px-3 py-2 border border-slate-300 rounded-lg font-mono font-semibold text-sm text-slate-800 focus:outline-none focus:border-slate-500" placeholder="0">
                        <span class="absolute right-3 top-1/2 -translate-y-1/2 text-xs font-bold text-slate-400">กรัม</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse text-sm">
                <thead>
                    <tr class="bg-slate-100 border-b border-slate-300 text-xs font-bold text-slate-600 uppercase tracking-wider">
                        <th class="px-6 py-3.5 font-semibold whitespace-nowrap w-28">ลำดับวัน</th>
                        <th class="px-4 py-3.5 font-semibold text-center w-16">วัน</th>
                        <th class="px-6 py-3.5 w-48">วันที่ตามปฏิทิน</th>
                        <th class="px-6 py-3.5 w-44">สถานะ</th>
                        <th class="px-6 py-3.5 text-right">จำนวนไก่ (ตัว)</th>
                        <th class="px-6 py-3.5 text-right">อาหาร/ตัว (กรัม)</th>
                        <th class="px-6 py-3.5 text-right">อาหารวันนี้ (กก.)</th>
                        <th class="px-6 py-3.5 text-right">อาหารสะสม (กก.)</th>
                    </tr>
                </thead>
                <tbody id="table_body" class="divide-y divide-slate-200">
                </tbody>
                <tfoot id="table_foot" class="bg-slate-50/80 border-t-2 border-slate-900 font-bold text-slate-900">
                </tfoot>
            </table>
        </div>

        <div class="bg-slate-50/60 px-6 py-6 border-t border-slate-200 flex flex-col items-center justify-center gap-2 no-print">
            <div class="text-xs font-bold text-slate-500 mb-2" id="info_text">—</div>
            <button class="px-10 py-3.5 bg-blue-700 hover:bg-blue-800 text-white rounded-xl text-sm font-bold shadow-md hover:shadow-lg transition-all flex items-center justify-center gap-2 w-full sm:w-auto" onclick="window.print()">
                🖨️ พิมพ์รายงาน
            </button>
        </div>
    </main>

    <script>
        const FORMULA_CONFIG = {
            1: { feed: 7, skip: 0, label: 'ทุกวัน' },
            2: { feed: 4, skip: 3, label: 'ให้ 4 / เว้น 3' },
            3: { feed: 5, skip: 2, label: 'ให้ 5 / เว้น 2' },
            4: { feed: 6, skip: 1, label: 'ให้ 6 / เว้น 1' }
        };

        const THAI_WEEKDAYS = ['อา', 'จ', 'อ', 'พ', 'พฤ', 'ศ', 'ส'];

        function num(id) { return parseFloat(document.getElementById(id).value) || 0; }
        function fmt(n) {
            return Number(n).toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        }
        function set(id, val) { const el = document.getElementById(id); if (el) el.textContent = val; }

        function handleFormulaChange() {
            const currentFormula = document.getElementById('formula_select').value;
            const feedDays = FORMULA_CONFIG[currentFormula].feed;
            const tbody = document.getElementById('table_body');
            tbody.innerHTML = '';

            let baseDate = new Date();

            for (let d = 1; d <= 7; d++) {
                const isFeed = d <= feedDays;
                const tr = document.createElement('tr');
                tr.id = `row_day_${d}`;
                tr.className = `transition-colors duration-150 ${isFeed ? 'bg-white hover:bg-slate-50' : 'bg-slate-50/60 text-slate-500'}`;

                const dateString = baseDate.toISOString().split('T')[0];

                tr.innerHTML = `
                        <td class="px-6 py-3.5 font-bold whitespace-nowrap text-slate-700">
                            วันที่ ${d}
                        </td>
                        <td class="px-4 py-3.5 text-center font-bold text-slate-600" id="weekday_name_${d}">
                            -
                        </td>
                        <td class="px-6 py-3.5">
                            <input type="date" class="no-print px-2.5 py-1 border border-slate-300 rounded-lg text-xs font-semibold focus:outline-none focus:border-slate-500 bg-white" id="date_day_${d}" value="${dateString}" onchange="updateAllDates(${d})">
                            <span class="print-only font-mono font-semibold text-slate-800" id="print_date_${d}">${dateString}</span>
                        </td>
                        <td class="px-6 py-3.5">
                            <div class="no-print inline-flex p-0.5 bg-slate-200 rounded-md gap-0.5">
                                <input type="radio" class="hidden" name="status_day_${d}" id="status_feed_${d}" value="feed" ${isFeed ? 'checked' : ''} onchange="onStatusToggle(${d})">
                                <label for="status_feed_${d}" class="px-3 py-0.5 text-xs font-bold rounded cursor-pointer select-none transition-all ${isFeed ? 'bg-emerald-600 text-white shadow-sm' : 'text-slate-600 hover:text-slate-900'}">ให้</label>

                                <input type="radio" class="hidden" name="status_day_${d}" id="status_skip_${d}" value="skip" ${!isFeed ? 'checked' : ''} onchange="onStatusToggle(${d})">
                                <label for="status_skip_${d}" class="px-3 py-0.5 text-xs font-bold rounded cursor-pointer select-none transition-all ${!isFeed ? 'bg-amber-600 text-white shadow-sm' : 'text-slate-600 hover:text-slate-900'}">เว้น</label>
                            </div>
                            <span class="print-only font-bold text-xs ${isFeed ? 'text-emerald-600' : 'text-slate-400'}" id="print_status_${d}">${isFeed ? 'ให้อาหาร' : 'เว้นวัน'}</span>
                        </td>
                        <td class="px-6 py-3.5 text-right font-mono text-slate-600" id="chickens_day_${d}">0</td>
                        <td class="px-6 py-3.5 text-right font-mono text-slate-600" id="grams_day_${d}">0</td>
                        <td class="px-6 py-3.5 text-right font-mono font-bold text-slate-800" id="daily_kg_day_${d}">0</td>
                        <td class="px-6 py-3.5 text-right font-mono font-bold text-slate-800" id="cumulative_day_${d}">0</td>
                    `;
                tbody.appendChild(tr);
                baseDate.setDate(baseDate.getDate() + 1);
            }
            calc();
        }

        function updateAllDates(changedDayIndex) {
            const currentInput = document.getElementById(`date_day_${changedDayIndex}`);
            if (!currentInput || !currentInput.value) return;

            let currentDate = new Date(currentInput.value);

            for (let d = changedDayIndex + 1; d <= 7; d++) {
                const targetInput = document.getElementById(`date_day_${d}`);
                if (targetInput) {
                    currentDate.setDate(currentDate.getDate() + 1);
                    const year = currentDate.getFullYear();
                    const month = String(currentDate.getMonth() + 1).padStart(2, '0');
                    const day = String(currentDate.getDate()).padStart(2, '0');
                    targetInput.value = `${year}-${month}-${day}`;
                }
            }
            calc();
        }

        function onStatusToggle(day) {
            const tr = document.getElementById(`row_day_${day}`);
            const isFeed = document.getElementById(`status_feed_${day}`).checked;

            if (isFeed) {
                tr.className = "bg-white hover:bg-slate-50 text-slate-900 transition-colors duration-150";
                document.querySelector(`label[for="status_feed_${day}"]`).className = "px-3 py-0.5 text-xs font-bold rounded cursor-pointer select-none transition-all bg-emerald-600 text-white shadow-sm";
                document.querySelector(`label[for="status_skip_${day}"]`).className = "px-3 py-0.5 text-xs font-bold rounded cursor-pointer select-none transition-all text-slate-600 hover:text-slate-900";
            } else {
                tr.className = "bg-slate-50/60 text-slate-400 transition-colors duration-150";
                document.querySelector(`label[for="status_feed_${day}"]`).className = "px-3 py-0.5 text-xs font-bold rounded cursor-pointer select-none transition-all text-slate-600 hover:text-slate-900";
                document.querySelector(`label[for="status_skip_${day}"]`).className = "px-3 py-0.5 text-xs font-bold rounded cursor-pointer select-none transition-all bg-amber-600 text-white shadow-sm";
            }
            calc();
        }

        function calc() {
            const farm = document.getElementById('farm_name').value;
            const flock = document.getElementById('flock_name').value;
            const house = document.getElementById('house_select').value;
            const round = document.getElementById('round_no').value;

            const chickens = num('chickens');
            const grams = num('grams');
            const chickenWeight = num('chicken_weight');

            let refNo = farm + flock + house + round;
            set('ref_no_display', refNo);

            set('print_flock', flock);
            set('print_house', house);
            set('print_round', round.trim() !== "" ? round : "-");

            let activeFeedDays = 0;
            let activeSkipDays = 0;

            for (let d = 1; d <= 7; d++) {
                const radioFeed = document.getElementById(`status_feed_${d}`);
                if (radioFeed && radioFeed.checked) activeFeedDays++; else activeSkipDays++;

                const printDate = document.getElementById(`print_date_${d}`);
                const inputDate = document.getElementById(`date_day_${d}`);
                if (printDate && inputDate) printDate.textContent = inputDate.value;

                if (inputDate && inputDate.value) {
                    const parsedDate = new Date(inputDate.value);
                    if (!isNaN(parsedDate.getTime())) {
                        const dayName = THAI_WEEKDAYS[parsedDate.getDay()];
                        set(`weekday_name_${d}`, dayName);
                    }
                }

                const printStatus = document.getElementById(`print_status_${d}`);
                if (printStatus && radioFeed) {
                    printStatus.textContent = radioFeed.checked ? 'ให้อาหาร' : 'เว้นอาหาร';
                }
            }

            const daily_feed_kg = activeFeedDays > 0 ? Math.ceil((chickens * grams * 7) / activeFeedDays / 1000) : 0;

            let cumulative = 0;
            let actual_total_kg = 0;

            for (let d = 1; d <= 7; d++) {
                const radioFeed = document.getElementById(`status_feed_${d}`);
                const isFeed = radioFeed ? radioFeed.checked : (d <= activeFeedDays);

                const current_chickens = isFeed ? chickens : 0;
                const current_grams = isFeed ? grams : 0;
                const daily_kg = isFeed ? daily_feed_kg : 0;

                cumulative += daily_kg;
                if (isFeed) {
                    actual_total_kg += daily_kg;
                }

                set(`chickens_day_${d}`, fmt(current_chickens));
                set(`grams_day_${d}`, fmt(current_grams));
                set(`daily_kg_day_${d}`, fmt(daily_kg));
                set(`cumulative_day_${d}`, fmt(cumulative));
            }

            set('info_text', `สรุปผลคำนวณ: ให้อาหารจริง ${activeFeedDays} วัน / เว้น ${activeSkipDays} วัน — ปริมาณอาหารรวมทั้งหมด ${fmt(actual_total_kg)} กก.`);

            let headerText = `ไก่ ${fmt(chickens)} ตัว | อาหารรวม ${fmt(actual_total_kg)} กก.`;
            if (chickenWeight > 0) {
                headerText += ` | นน.ไก่ ${fmt(chickenWeight)} กรัม`;
            }
            set('print_summary_header', headerText);

            const tfoot = document.getElementById('table_foot');
            tfoot.innerHTML = `
                    <tr class="border-t border-slate-400 bg-slate-50/50">
                        <td class="px-6 py-4 font-bold" colspan="3">รวมสุทธิ</td>
                        <td class="px-6 py-4 font-semibold text-xs text-slate-500">(${activeFeedDays} วันให้ / ${activeSkipDays} วันเว้น)</td>
                        <td class="px-6 py-4 text-right font-mono font-semibold text-slate-400">—</td>
                        <td class="px-6 py-4 text-right font-mono font-bold">—</td>
                        <td class="px-6 py-4 text-right font-mono font-bold text-blue-900">${fmt(actual_total_kg)}</td>
                        <td class="px-6 py-4 text-right font-mono font-bold text-blue-900">${fmt(actual_total_kg)}</td>
                    </tr>
                `;
        }

        handleFormulaChange();
    </script>
</body>
</html>
